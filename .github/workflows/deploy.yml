name: CI - Build & Push Docker image

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simplechat:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/simplechat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_rolling:
    needs: build_and_push
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        host: [ "${{ secrets.SPRING_HOST_1 }}", "${{ secrets.SPRING_HOST_2 }}" ]
    steps:
      - name: Deploy to EC2 (rolling)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/simplechat
            
            # 1) 이미지 태그 교체
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=sha-${{ github.sha }}/" .env
            
            # 2) pull & up
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # 3) 헬스체크 대기 (예: actuator)
            for i in {1..60}; do
              if curl -fsS http://localhost:8080/actuator/health | grep -q UP; then
                echo "healthy"
                exit 0
              fi
              sleep 2
            done
            echo "health check failed"
            exit 1